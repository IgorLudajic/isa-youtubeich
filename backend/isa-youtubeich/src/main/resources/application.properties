spring.application.name=isa-youtubeich
server.port=${SERVER_PORT:8080}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

spring.sql.init.mode=never
spring.sql.init.platform=${SPRING_DATASOURCE_PLATFORM:postgres}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/youtubeich}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.show-sql=true

spring.jpa.hibernate.ddl-auto=none

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
# Email Configuration
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Application URL for email links
app.base.url=${APP_BASE_URL:http://localhost:8080}

app.comment-rate-limit.period=3600000
app.comment-rate-limit.count=60

# Redis
spring.cache.type=redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.cache.redis.time-to-live=600000

# JWT
# Token validity period (ms). 24h = 86400000
app.jwt.expires-in-ms=86400000
spring.jackson.use-jackson2-defaults=true

server.tomcat.connection-timeout=60000
server.tomcat.keep-alive-timeout=60000
spring.mvc.async.request-timeout=60000

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
