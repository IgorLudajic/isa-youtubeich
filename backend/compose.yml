services:
  app:
    profiles: [ "prod" ]
    build:
      context: backend/isa-youtubeich
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-youtubeich}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SERVER_PORT: 8080
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    deploy:
      replicas: 2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - path: ../.env
        required: false

  app-dev:
    profiles: [ "dev" ]
    image: maven:3.9.12-eclipse-temurin-25-alpine
    working_dir: /workspace
    command: >-
      sh -c "apk add --no-cache ffmpeg && ./mvnw spring-boot:run
      -Dspring-boot.run.profiles=${SPRING_PROFILES_ACTIVE:-dev}
      -Dspring-boot.run.fork=false
      -Dmaven.repo.local=/tmp/maven/.m2/repository
      -Dspring-boot.run.jvmArguments='-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005'"
    environment:
      HOME: /tmp/maven
      MAVEN_CONFIG: /tmp/maven/.m2
      # Point Maven explicitly to the volume-backed directory
      MAVEN_OPTS: "-Dmaven.repo.local=/tmp/maven/.m2/repository"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-youtubeich}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SERVER_PORT: 8080
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    deploy:
      replicas: 2
    volumes:
      - ./isa-youtubeich:/workspace:ro
      - maven-repo:/tmp/maven/.m2/repository
      # Host build output so DevTools restarts as soon as IntelliJ compiles.
      - ./isa-youtubeich/target:/workspace/target
      - uploads:/workspace/uploads
#    ports:
#      - "${DEBUG_PORT:-5005}:5005"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - path: ../.env
        required: false

  db:
    image: postgres:18.1-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-youtubeich}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-youtubeich}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"

  nginx:
    profiles: [ "prod" ]
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  nginx-dev:
    profiles: [ "dev" ]
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx-dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-dev

volumes:
  db-data:
  maven-repo:
  uploads: